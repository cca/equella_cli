name: GitHub Release & NPM Publish

on:
    push:
        tags:
            - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  github-release:
    needs: test
    name: Create GitHub Release 🚀
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          '${{ github.ref_name }}'
          --repo '${{ github.repository }}'
          --generate-notes

  npm-publish:
    needs: test
    name: Publish to NPM 📦
    permissions:
      contents: read
      id-token: write # for OIDC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Sets up .npmrc file to publish to npm
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # Setup pnpm
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: true
          version: latest
      # Need no git checks or this fails with ERR_PNPM_GIT_UNKNOWN_BRANCH
      # because we checked out a tag which is a detached head
      # Using Trusted Publishers, no NPM token https://docs.npmjs.com/trusted-publishers
      - run: pnpm publish --access public --no-git-checks
